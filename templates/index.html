<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Study Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 290px; background-color: #1a365d; color: white; padding: 20px; overflow-y: auto; }
        .menu-btn { background: none; border: none; color: white; padding: 10px; width: 100%; text-align: left; cursor: pointer; }
        .menu-btn.active { background-color: #2b6cb0; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .mode-window { display: none; }
        .mode-window.active { display: block; }
        .display-output { height: 300px; border: 1px solid #ccc; padding: 10px; background: white; margin-bottom: 10px; overflow-y: auto; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: 200px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🚀 AI Mega Suite</h2>
        <button class="menu-btn active" id="btn-chat" onclick="switchMode('chat')">💬 Chat</button>
        <button class="menu-btn" id="btn-calculator" onclick="switchMode('calculator')">🧮 Math</button>
        <button class="menu-btn" id="btn-translator" onclick="switchMode('translator')">🌐 Translate</button>
        <button class="menu-btn" id="btn-memory" onclick="switchMode('memory')">🏰 Memory</button>
        <button class="menu-btn" id="btn-simulator" onclick="switchMode('simulator')">🚨 Exam</button>
        </div>

    <div class="main-content">
        <input type="password" id="user-key" placeholder="Enter API Key">
        <div id="mode-chat" class="mode-window active">
            <h3>💬 Chat</h3>
            <div id="chat-output" class="display-output"></div>
            <input type="text" id="chat-input"><button onclick="runPipeline('chat', 'chat-input', 'chat-output')">Send</button>
        </div>
        <div id="mode-calculator" class="mode-window">
            <h3>🧮 Math</h3>
            <div id="calc-output" class="display-output"></div>
            <input type="text" id="calc-input"><button onclick="runPipeline('calculator', 'calc-input', 'calc-output')">Solve</button>
        </div>
        </div>

    <script>
        function switchMode(m) {
            document.querySelectorAll('.mode-window').forEach(w => w.classList.remove('active'));
            document.getElementById('mode-'+m).classList.add('active');
        }
        function runPipeline(mode, inputId, outputId) {
            let msg = document.getElementById(inputId).value;
            let key = document.getElementById('user-key').value;
            fetch('/ask_ai', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, mode: mode, api_key: key})
            }).then(r => r.json()).then(d => {
                document.getElementById(outputId).innerHTML += `<p><b>Buddy:</b> ${d.reply}</p>`;
            });
        }
    </script>
</body>
</html>
